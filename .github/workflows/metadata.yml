name: Update Radio Metadata

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: pip install requests

      - name: Run parser
        run: python3 parse.py

      - name: Commit & Push
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"

          echo "$(date)" > heartbeat.txt

          git add metadata.json heartbeat.txt
          git commit -m "update" || echo "no changes"
          git push
