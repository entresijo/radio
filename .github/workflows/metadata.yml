name: Update Radio Metadata

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch HTML
        run: |
          curl -s http://uk15freenew.listen2myradio.com:4243/ > raw.html
          echo "HTML descargado"
          head -n 20 raw.html

      - name: Parse metadata
        run: |
          python3 <<EOF
import re

html = open("raw.html").read()

song_match = re.search(r'Current Song:</td>\s*<td[^>]*>(.*?)</td>', html, re.I)
listeners_match = re.search(r'Current Listeners:</td>\s*<td[^>]*>(\d+)', html, re.I)

song = song_match.group(1).strip() if song_match else ""
listeners = int(listeners_match.group(1)) if listeners_match else 0

print("SONG:", song)
print("LISTENERS:", listeners)

with open("metadata.json", "w") as f:
    f.write(f'{{ "song": "{song}", "listeners": {listeners} }}')
EOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add metadata.json

          git commit -m "update metadata" || echo "Sin cambios para commitear"

          git push
