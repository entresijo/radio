<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entresijo</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container { text-align:center; width:90%; max-width:400px; }

.onair {
  padding:6px 14px;
  border-radius:20px;
  margin-bottom:20px;
}
.on { background:red; }
.off { background:#00c853; color:black; }

.play-btn {
  width:120px;
  height:120px;
  border-radius:50%;
  background:red;
  border:none;
  color:white;
  font-size:40px;
}

.track { margin-top:20px; font-weight:bold; }
.listeners { font-size:0.8em; opacity:0.7; }
</style>
</head>

<body>

<div class="container">

<h1>🎵 Entresijo</h1>

<div id="onair" class="onair off">● FUERA DEL AIRE</div>

<button id="btn" class="play-btn">▶</button>

<div id="track">—</div>
<div id="listeners"></div>

<audio id="player"></audio>

</div>

<script>

const STREAM_URL = "https://uk15freenew.listen2myradio.com/live.mp3?typeportmount=ice_4243_stream_737103432"
const META_URL = "https://raw.githubusercontent.com/entresijo/radio/main/metadata.json"


const btn = document.getElementById("btn")
const player = document.getElementById("player")
const onair = document.getElementById("onair")
const track = document.getElementById("track")
const listeners = document.getElementById("listeners")

let playing = false

function setOnAir(state){
  if(state){
    onair.className = "onair on"
    onair.innerText = "● EN EL AIRE"
  }else{
    onair.className = "onair off"
    onair.innerText = "● FUERA DEL AIRE"
  }
}

async function load(){

  try{
    const res = await fetch(META_URL + "?t=" + Date.now())
    const data = await res.json()

    const age = (Date.now()/1000) - data.timestamp

    // 🔥 clave: si es viejo → offline
    if(age > 300){
      setOnAir(false)
      return
    }

    setOnAir(true)

    track.innerText = data.song || "—"
    listeners.innerText = data.listeners
      ? "👥 " + data.listeners
      : ""

  }catch(e){
    setOnAir(false)
  }
}

btn.onclick = () => {
  if(!playing){
    player.src = STREAM_URL
    player.play().catch(()=>alert("error de stream"))
    btn.innerText = "⏸"
    playing = true
  }else{
    player.pause()
    btn.innerText = "▶"
    playing = false
  }
}

setInterval(load, 15000)
load()

</script>

</body>
</html>
