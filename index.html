<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entresijo Radio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff3b30; --bg: #000000; --card: #0a0a0a; --text: #ffffff; --text-dim: #555; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; display: flex; 
            justify-content: center; align-items: center; min-height: 100vh;
            padding: 20px;
        }

        .player-app { width: 100%; max-width: 400px; text-align: center; }

        /* Header Superior */
        .top-bar { margin-bottom: 50px; }
        #station-name { font-weight: 800; font-size: 12px; letter-spacing: 4px; color: var(--primary); display: block; margin-bottom: 8px; }
        #clock { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }

        /* Badge de Estado */
        #status-badge { 
            font-size: 10px; font-weight: 800; padding: 6px 18px; 
            border-radius: 4px; display: inline-block; margin-bottom: 40px;
            text-transform: uppercase; letter-spacing: 2px;
            border: 1px solid #222; color: #444; transition: 0.4s;
        }
        #status-badge.online { color: var(--primary); border-color: var(--primary); box-shadow: 0 0 15px rgba(255,59,48,0.15); }

        /* Bloque Central de Control */
        .core-ui { 
            display: flex; align-items: center; justify-content: center; 
            gap: 40px; margin-bottom: 50px;
        }

        .play-outer { position: relative; width: 140px; height: 140px; }
        
        /* Spinner de Carga Perimetral */
        .loading-ring {
            position: absolute; top: -8px; left: -8px; right: -8px; bottom: -8px;
            border: 3px solid transparent; border-top-color: var(--primary);
            border-radius: 50%; display: none; animation: spin 1s linear infinite;
            z-index: 1;
        }

        /* Canvas Vúmetro Circular */
        #vu-canvas { position: absolute; top: -8px; left: -8px; z-index: 2; transform: rotate(-90deg); }

        .play-btn {
            position: relative; z-index: 10; width: 100%; height: 100%; 
            border-radius: 50%; background: #111; border: 1px solid #222;
            color: white; font-size: 40px; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .play-btn:active { transform: scale(0.92); }
        .play-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Volumen Vertical */
        .vol-fader { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .vol-slider {
            appearance: slider-vertical; width: 5px; height: 120px;
            background: #1a1a1a; outline: none; border-radius: 10px; accent-color: var(--primary);
        }
        .vol-label { font-size: 10px; color: var(--text-dim); font-weight: 800; }

        /* Now Playing */
        .meta-display { margin-bottom: 50px; padding: 0 10px; }
        #artist { display: block; font-size: 12px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
        #title { display: block; font-size: 24px; font-weight: 200; line-height: 1.2; }

        /* Historial Desplegable */
        .history-wrap { text-align: left; border-top: 1px solid #111; padding-top: 20px; }
        .history-toggle { 
            background: none; border: none; color: var(--text-dim); font-size: 10px; 
            font-weight: 800; cursor: pointer; padding: 0; text-transform: uppercase; letter-spacing: 1px;
        }
        #history-content { 
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease; 
            margin-top: 15px;
        }
        .h-item { font-size: 12px; margin-bottom: 12px; border-left: 2px solid #1a1a1a; padding-left: 10px; opacity: 0.7; }
        .h-item strong { color: var(--primary); font-weight: 400; display: block; font-size: 10px; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- RESET DE INTERACCIONES NATIVAS --- */

/* 1. Elimina el recuadro naranja/celeste de foco en todos los navegadores */
*:focus {
    outline: none !important;
}

/* 2. Elimina el recuadro azul/celeste transparente al tocar en móviles */
* {
    -webkit-tap-highlight-color: transparent;
}

/* --- REACCIÓN PREMIUM DEL BOTÓN --- */

.play-btn {
    position: relative; 
    z-index: 10; 
    width: 100%; 
    height: 100%; 
    border-radius: 50%; 
    background: #111; 
    border: 1px solid #222;
    color: white; 
    font-size: 40px; 
    cursor: pointer;
    /* Transición suave para todos los estados */
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Efecto al presionar (Toque) - Reemplaza el recuadro azul con algo sutil */
.play-btn:active {
    transform: scale(0.92);
    background: #151515;
    border-color: rgba(255, 59, 48, 0.4);
}

/* Efecto de Foco/Selección - Reemplaza el recuadro naranja con un brillo rojo */
.play-btn:focus-visible {
    box-shadow: 0 0 25px rgba(255, 59, 48, 0.3);
    border-color: var(--primary);
}

/* Evita que el botón se vea grisáceo al estar deshabilitado por el sistema */
.play-btn:disabled {
    opacity: 0.2;
    cursor: not-allowed;
    filter: grayscale(1);
}
    </style>
</head>
<body>

<div class="player-app">
    <div class="top-bar">
        <span id="station-name">ENTRESIJO RADIO</span>
        <div id="clock">--:-- — --/--/--</div>
    </div>

    <div id="status-badge">Detectando señal...</div>

    <div class="core-ui">
        <div class="play-outer">
            <div id="loading-ring" class="loading-ring"></div>
            <canvas id="vu-canvas" width="156" height="156"></canvas>
            <button id="btn" class="play-btn" disabled>▶</button>
        </div>

        <div class="vol-fader">
            <span class="vol-label">MAX</span>
            <input type="range" id="volume" class="vol-slider" min="0" max="1" step="0.05" value="0.8">
            <span class="vol-label">🔊</span>
        </div>
    </div>

    <div class="meta-display">
        <span id="artist">ENTRESIJO</span>
        <span id="title">Radio Serrana</span>
    </div>

    <div class="history-wrap">
        <button class="history-toggle" onclick="toggleHistory()">Historial +</button>
        <div id="history-content">
            <div id="history-list"></div>
        </div>
    </div>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    const WORKER = "https://white-mud-e8b6.entresijoradio.workers.dev";
    const btn = document.getElementById("btn");
    const player = document.getElementById("player");
    const ring = document.getElementById("loading-ring");
    const statusBadge = document.getElementById("status-badge");
    const canvas = document.getElementById("vu-canvas");
    const ctx = canvas.getContext("2d");

    let isPlaying = false;
    let audioCtx, analyser, dataArray;

    function updateClock() {
        const now = new Date();
        const time = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const date = now.toLocaleDateString([], {day: '2-digit', month:'2-digit', year:'2-digit'});
        document.getElementById("clock").innerText = `${time} — ${date}`;
    }
    setInterval(updateClock, 1000); updateClock();

    function drawVu() {
        if(!isPlaying) { ctx.clearRect(0,0,156,156); return; }
        requestAnimationFrame(drawVu);
        analyser.getByteFrequencyData(dataArray);
        ctx.clearRect(0,0,156,156);
        ctx.lineWidth = 4;
        ctx.strokeStyle = "#ff3b30";
        const avg = dataArray.reduce((a,b) => a+b) / dataArray.length;
        const limit = (avg / 255) * Math.PI * 2;
        ctx.beginPath();
        ctx.arc(78, 78, 74, 0, limit);
        ctx.stroke();
    }

    async function fetchMeta() {
        try {
            const res = await fetch(`${WORKER}/api/radio-info`);
            const d = await res.json();
            
            if(d.isLive) {
                statusBadge.innerText = "● EN EL AIRE";
                statusBadge.classList.add("online");
                btn.disabled = false;
                document.getElementById("artist").innerText = d.artist || "ENTRESIJO";
                document.getElementById("title").innerText = d.title || "Radio Serrana";
                
                if(d.history) {
                    document.getElementById("history-list").innerHTML = d.history.map(h => `
                        <div class="h-item"><strong>${h.artist}</strong>${h.title}</div>
                    `).join('');
                }
            } else {
                statusBadge.innerText = "OFFLINE";
                statusBadge.classList.remove("online");
                btn.disabled = true;
                document.getElementById("title").innerText = "Transmisión pausada";
            }
        } catch(e) { statusBadge.innerText = "Error de servidor"; }
    }

    btn.onclick = async () => {
        if (!isPlaying) {
            if(!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaElementSource(player);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 64;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            
            btn.innerText = "";
            ring.style.display = "block";
            statusBadge.innerText = "CONECTANDO...";
            
            player.src = `${WORKER}/api/stream?t=${Date.now()}`;
            try {
                await player.play();
                isPlaying = true;
                btn.innerText = "⏸";
                ring.style.display = "none";
                statusBadge.innerText = "● EN EL AIRE";
                drawVu();
            } catch(e) { 
                btn.innerText = "▶"; 
                ring.style.display = "none";
                statusBadge.innerText = "Error de conexión";
            }
        } else {
            isPlaying = false;
            player.pause();
            player.src = "";
            btn.innerText = "▶";
            statusBadge.innerText = "● EN EL AIRE";
            ctx.clearRect(0,0,156,156);
        }
    };

    function toggleHistory() {
        const content = document.getElementById("history-content");
        content.style.maxHeight = content.style.maxHeight === "300px" ? "0" : "300px";
    }

    document.getElementById("volume").oninput = (e) => player.volume = e.target.value;
    setInterval(fetchMeta, 15000);
    fetchMeta();
</script>
</body>
</html>
