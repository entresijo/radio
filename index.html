<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entresijo Radio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff3b30;
            --bg: #0d0d0d;
            --card: #1a1a1a;
            --text: #ffffff;
            --text-dim: #888;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .container {
            width: 320px; padding: 30px; background: var(--card);
            border-radius: 32px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        /* Reloj y Fecha */
        .datetime { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 15px; letter-spacing: 1px; }

        .radio-header h1 { font-size: 1.2rem; margin: 0; }
        .radio-header p { font-size: 0.75rem; color: var(--text-dim); margin: 5px 0 25px; }

        /* Botón con Spinner */
        .player-rel { position: relative; width: 120px; height: 120px; margin: 0 auto 25px; }
        
        .play-btn {
            width: 100%; height: 100%; border-radius: 50%;
            background: var(--primary); border: none; color: white;
            font-size: 35px; cursor: pointer; position: relative; z-index: 2;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .play-btn.loading { background: #333; cursor: wait; }

        /* Spinner Sutil */
        .spinner {
            position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 3px solid transparent; border-top-color: var(--primary);
            border-radius: 50%; display: none;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Info de Canción */
        .track-info { min-height: 80px; margin-bottom: 20px; }
        #artist { display: block; font-size: 0.85rem; color: var(--primary); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        #title { display: block; font-size: 1.1rem; font-weight: 400; line-height: 1.2; }

        /* Volumen */
        .volume-container { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        input[type=range] { flex: 1; accent-color: var(--primary); cursor: pointer; }

        .listeners { font-size: 0.7rem; color: var(--text-dim); }
    </style>
</head>
<body>

<div class="container">
    <div id="datetime" class="datetime">--:-- | --/--/--</div>
    
    <div class="radio-header">
        <h1 id="radio-name">Entresijo</h1>
        <p id="radio-desc">Cargando emisora...</p>
    </div>

    <div class="player-rel">
        <div id="spinner" class="spinner"></div>
        <button id="btn" class="play-btn">▶</button>
    </div>

    <div class="track-info">
        <span id="artist">—</span>
        <span id="title">Conectando...</span>
    </div>

    <div class="volume-container">
        <span>🔈</span>
        <input type="range" id="volume" min="0" max="1" step="0.1" value="0.8">
        <span>🔊</span>
    </div>

    <div id="listeners" class="listeners">👥 0 oyentes</div>
</div>

<audio id="player"></audio>

<script>
    const WORKER = "https://white-mud-e8b6.entresijoradio.workers.dev";
    const btn = document.getElementById("btn");
    const player = document.getElementById("player");
    const spinner = document.getElementById("spinner");
    const volume = document.getElementById("volume");

    let isPlaying = false;

    // Reloj en tiempo real
    function updateTime() {
        const now = new Date();
        document.getElementById("datetime").innerText = 
            now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + " | " + 
            now.toLocaleDateString();
    }
    setInterval(updateTime, 1000);
    updateTime();

    // Cargar Metadata
    async function fetchMeta() {
        try {
            const res = await fetch(`${WORKER}/api/radio-info`);
            const d = await res.json();
            
            document.getElementById("radio-name").innerText = d.radioName || "Entresijo";
            document.getElementById("radio-desc").innerText = d.description || "";
            document.getElementById("artist").innerText = d.artist || "En vivo";
            document.getElementById("title").innerText = d.title || "Transmisión";
            document.getElementById("listeners").innerText = `👥 ${d.listeners} oyentes`;
        } catch(e) {}
    }

    // Control de Reproducción
    btn.addEventListener("click", async () => {
        if (!isPlaying) {
            btn.classList.add("loading");
            spinner.style.display = "block";
            btn.innerText = ""; // Quitamos el icono mientras carga
            
            player.src = `${WORKER}/api/stream`;
            try {
                await player.play();
                isPlaying = true;
                btn.innerText = "⏸";
                btn.classList.remove("loading");
                spinner.style.display = "none";
            } catch(e) {
                resetBtn();
            }
        } else {
            player.pause();
            player.src = "";
            isPlaying = false;
            resetBtn();
        }
    });

    function resetBtn() {
        btn.innerText = "▶";
        btn.classList.remove("loading");
        spinner.style.display = "none";
    }

    // Volumen
    volume.addEventListener("input", (e) => {
        player.volume = e.target.value;
    });

    setInterval(fetchMeta, 15000);
    fetchMeta();
</script>
</body>
</html>
