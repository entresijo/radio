<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entresijo</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 400px;
  text-align: center;
}

.onair {
  padding: 6px 14px;
  border-radius: 20px;
  margin-bottom: 20px;
}

.onair.on { background: red; }
.onair.off { background: #00c853; color: black; }

.play-btn {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: red;
  border: none;
  color: white;
  font-size: 40px;
  cursor: pointer;
}

.status { margin-top: 10px; }
.track { margin-top: 20px; font-weight: bold; }
.listeners { font-size: 0.85em; opacity: 0.7; }

audio {
  width: 100%;
  margin-top: 20px;
  filter: invert(1);
}
</style>
</head>

<body>

<div class="container">

<h1>🎵 Entresijo</h1>

<div id="onair" class="onair off">● FUERA DEL AIRE</div>

<button id="btn" class="play-btn">▶</button>

<div id="status" class="status">listo</div>

<div id="track" class="track">—</div>
<div id="listeners" class="listeners"></div>

<audio id="player" controls></audio>

</div>

<script>

/* ========= CONFIG ========= */

// STREAM (esto sigue siendo dinámico pero el tuyo actual funciona)
const STREAM_URL = "https://uk15freenew.listen2myradio.com/live.mp3?typeportmount=ice_4243_stream_737103432"

// metadata desde GitHub
const METADATA_URL = "/radio/metadata.json"

/* ========= ELEMENTOS ========= */

const player = document.getElementById("player")
const btn = document.getElementById("btn")
const status = document.getElementById("status")
const onair = document.getElementById("onair")
const track = document.getElementById("track")
const listeners = document.getElementById("listeners")

let playing = false

/* ========= UI ========= */

function setOnAir(state){
  if(state === "on"){
    onair.className = "onair on"
    onair.innerText = "● EN EL AIRE"
  } else {
    onair.className = "onair off"
    onair.innerText = "● FUERA DEL AIRE"
  }
}

/* ========= PLAYER ========= */

btn.onclick = () => {
  if(!playing){
    player.src = STREAM_URL
    player.play().catch(() => {
      status.innerText = "error al reproducir"
    })
    btn.innerHTML = "⏸"
    status.innerText = "conectando..."
    playing = true
  } else {
    player.pause()
    btn.innerHTML = "▶"
    status.innerText = "pausado"
    playing = false
  }
}

player.onplaying = () => status.innerText = "reproduciendo"
player.onwaiting = () => status.innerText = "cargando..."
player.onerror = () => status.innerText = "error de stream"

/* ========= FETCH METADATA ========= */

async function fetchMetadata(){

  try{
    const res = await fetch(METADATA_URL + "?t=" + Date.now())
    if(!res.ok) throw new Error("no responde")

    const data = await res.json()

    // SI hay datos → está al aire
    setOnAir("on")

    track.innerText = data.song || "—"
    listeners.innerText = data.listeners
      ? "👥 " + data.listeners + " oyentes"
      : ""

  } catch(e){
    // si falla → fuera del aire
    setOnAir("off")
    track.innerText = "sin datos"
    listeners.innerText = ""
  }
}

/* ========= LOOP ========= */

setInterval(fetchMetadata, 15000)
fetchMetadata()

</script>

</body>
</html>
