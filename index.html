<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entresijo Radio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff3b30; --bg: #000; --card: #0a0a0a; --text: #fff; --text-dim: #444; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
        }

        .console {
            background: var(--card); border-radius: 40px; padding: 40px;
            border: 1px solid #1a1a1a; width: 340px; position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        /* Encabezado: Nombre Radio + Fecha/Hora */
        .header-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
        .radio-name { font-weight: 700; font-size: 12px; letter-spacing: 2px; color: var(--primary); text-transform: uppercase; }
        .clock { font-size: 10px; color: var(--text-dim); text-align: right; line-height: 1.4; }

        /* Pantalla Central de Metadata */
        .display-screen { text-align: center; margin-bottom: 40px; min-height: 100px; }
        #artist { font-size: 11px; font-weight: 700; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
        #title { font-size: 22px; font-weight: 200; margin-top: 10px; display: block; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        /* Controles Integrados */
        .controls-row { display: flex; align-items: center; justify-content: space-around; margin-bottom: 30px; }

        /* Botón Play con Anillo de Carga */
        .play-outer { position: relative; width: 100px; height: 100px; }
        .play-btn {
            width: 100%; height: 100%; border-radius: 50%;
            background: #111; border: 1px solid #222; color: white;
            font-size: 30px; cursor: pointer; position: relative; z-index: 10;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .play-btn.active { border-color: var(--primary); box-shadow: 0 0 30px rgba(255, 59, 48, 0.2); }
        
        .ring-spinner {
            position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px;
            border: 2px solid transparent; border-top-color: var(--primary);
            border-radius: 50%; display: none; animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Volumen Vertical Sutil */
        .vol-fader { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .vol-slider {
            appearance: slider-vertical; width: 3px; height: 90px;
            background: #222; outline: none; border-radius: 2px;
            accent-color: var(--primary);
        }
        .vol-label { font-size: 8px; color: var(--text-dim); font-weight: 700; }

        /* Footer: WhatsApp + Oyentes */
        .footer-tools { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #1a1a1a; padding-top: 25px; }
        .ws-link { 
            color: #25d366; text-decoration: none; font-size: 11px; 
            font-weight: 700; display: flex; align-items: center; gap: 5px;
        }
        .listeners { font-size: 10px; color: var(--text-dim); font-weight: 700; }

    </style>
</head>
<body>

<div class="console">
    <div class="header-info">
        <div class="radio-name" id="radio-name">Entresijo Radio</div>
        <div class="clock" id="datetime">--:--<br>--/--/--</div>
    </div>

    <div class="display-screen">
        <span id="artist">CONECTANDO</span>
        <span id="title">Radio Serrana</span>
    </div>

    <div class="controls-row">
        <div class="play-outer">
            <div id="spinner" class="ring-spinner"></div>
            <button id="btn" class="play-btn">▶</button>
        </div>

        <div class="vol-fader">
            <span class="vol-label">MAX</span>
            <input type="range" id="volume" class="vol-slider" min="0" max="1" step="0.05" value="0.8">
            <span class="vol-label">VOL</span>
        </div>
    </div>

    <div class="footer-tools">
        <a href="https://wa.me/TU_NUMERO" target="_blank" class="ws-link">
            <span>WHATSAPP</span>
        </a>
        <div id="listeners" class="listeners">0 OYENTES</div>
    </div>
</div>

<audio id="player" crossorigin="anonymous" preload="none"></audio>

<script>
    const WORKER = "https://white-mud-e8b6.entresijoradio.workers.dev";
    const btn = document.getElementById("btn");
    const player = document.getElementById("player");
    const spinner = document.getElementById("spinner");

    function updateClock() {
        const now = new Date();
        const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const date = now.toLocaleDateString([], { day: '2-digit', month: '2-digit', year: '2-digit' });
        document.getElementById("datetime").innerHTML = `${time}<br>${date}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    async function fetchMeta() {
        try {
            const res = await fetch(`${WORKER}/api/radio-info`);
            const d = await res.json();
            
            document.getElementById("radio-name").innerText = d.radioName || "ENTRESIJO RADIO";
            document.getElementById("listeners").innerText = `${d.listeners || 0} OYENTES`;
            
            if(d.isLive) {
                document.getElementById("artist").innerText = d.artist || "EN VIVO";
                document.getElementById("title").innerText = d.title || "ENTRESIJO";
            } else {
                document.getElementById("artist").innerText = "OFFLINE";
                document.getElementById("title").innerText = "ENSEGUIDA VOLVEMOS";
            }
        } catch(e) { console.error("Meta fail"); }
    }

    let isPlaying = false;
    btn.onclick = async () => {
        if (!isPlaying) {
            btn.innerText = "";
            spinner.style.display = "block";
            btn.classList.add("active");
            
            player.src = `${WORKER}/api/stream?t=${Date.now()}`;
            try {
                await player.play();
                isPlaying = true;
                btn.innerText = "⏸";
                spinner.style.display = "none";
            } catch(e) {
                btn.innerText = "▶";
                spinner.style.display = "none";
                btn.classList.remove("active");
            }
        } else {
            isPlaying = false;
            player.pause();
            player.src = "";
            btn.innerText = "▶";
            btn.classList.remove("active");
        }
    };

    document.getElementById("volume").oninput = (e) => player.volume = e.target.value;

    setInterval(fetchMeta, 15000);
    fetchMeta();
</script>
</body>
</html>
