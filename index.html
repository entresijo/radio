<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entresijo Radio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;800&display=swap" rel="stylesheet">
   <style>
    :root { 
        --primary: #80130f; 
        --primary-bright: #b31b14; 
        --bg: #050505; 
        --text: #e0e0e0; 
        --text-dim: #444; 
    }
    * { -webkit-tap-highlight-color: transparent !important; outline: none !important; box-sizing: border-box; }
    body { 
        margin: 0; background: var(--bg); color: var(--text); 
        font-family: 'Inter', sans-serif; display: flex; 
        justify-content: center; align-items: center; min-height: 100vh;
        padding: 20px; overflow-x: hidden;
    }
    .player-app { width: 100%; max-width: 440px; text-align: center; }
    .top-bar { margin-bottom: 40px; }
    #station-name { font-weight: 800; font-size: 13px; letter-spacing: 6px; color: var(--primary-bright); display: block; margin-bottom: 12px; text-transform: uppercase; }
    #description { font-size: 10px; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; display: block; margin-bottom: 8px; }
    #clock { font-size: 11px; color: #333; }
    #status-badge { 
        font-size: 12px; font-weight: 800; padding: 12px 30px; 
        border-radius: 4px; display: inline-block; margin-bottom: 50px;
        text-transform: uppercase; letter-spacing: 4px;
        border: 1px solid #111; color: #222;
    }
    #status-badge.online       { color: var(--primary-bright); border-color: #3d0907; }
    #status-badge.reconnecting { color: #555; border-color: #222; }
    .core-ui { 
        position: relative; display: flex; 
        align-items: center; justify-content: center;
        margin-bottom: 60px; width: 100%;
    }
    .play-outer { position: relative; width: 120px; height: 120px; z-index: 5; }
    .vol-fader { 
        position: absolute; right: 10%;
        display: flex; flex-direction: column; 
        align-items: center; gap: 10px; width: 40px;
    }
    .loading-ring {
        position: absolute; top: -8px; left: -8px; right: -8px; bottom: -8px;
        border: 2px solid rgba(128, 19, 15, 0.05);
        border-top: 2px solid var(--primary-bright);
        border-radius: 50%; display: none;
        animation: spin 0.8s linear infinite; z-index: 1;
    }
    #vu-canvas { position: absolute; top: -25px; left: -25px; z-index: 2; transform: rotate(-90deg); pointer-events: none; }
    .play-btn {
        position: relative; z-index: 10; width: 100%; height: 100%; 
        border-radius: 50%; background: #080808; border: 1px solid #1a1a1a;
        color: var(--primary); font-size: 35px; cursor: pointer; transition: 0.3s;
        display: flex; align-items: center; justify-content: center;
        box-shadow: inset 0 0 20px rgba(0,0,0,1);
    }
    .play-btn:active { transform: scale(0.95); }
    .vol-slider {
        -webkit-appearance: none; width: 120px; height: 2px;
        background: #111; border-radius: 10px;
        transform: rotate(-90deg); margin: 50px 0; cursor: pointer;
    }
    .vol-slider::-webkit-slider-thumb {
        -webkit-appearance: none; width: 15px; height: 8px;
        background: var(--primary); border-radius: 1px;
    }
    .vol-label { font-size: 9px; color: #333; font-weight: 800; letter-spacing: 1px; }
    .meta-display { margin-bottom: 60px; }
    #artist { display: block; font-size: 13px; font-weight: 700; color: var(--primary-bright); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; }
    #title { display: block; font-size: 28px; font-weight: 200; line-height: 1.2; color: #fff; }
    .history-wrap { text-align: left; border-top: 1px solid #0d0d0d; padding-top: 30px; }
    .history-toggle { background: none; border: none; color: #222; font-size: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
    #history-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease; }
    .h-item { font-size: 13px; margin-top: 20px; border-left: 1px solid #200605; padding-left: 15px; }
    .h-item strong { color: var(--primary); font-weight: 600; display: block; font-size: 9px; margin-bottom: 4px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="player-app">
    <div class="top-bar">
        <span id="station-name">ENTRESIJO RADIO</span>
        <span id="description">BUSCANDO SEÑAL...</span>
        <div id="clock">--:--</div>
    </div>
    <div id="status-badge">Detectando señal...</div>
    <div class="core-ui">
        <div class="play-outer">
            <div id="loading-ring" class="loading-ring"></div>
            <canvas id="vu-canvas" width="170" height="170"></canvas>
            <button id="btn" class="play-btn" disabled>▶</button>
        </div>
        <div class="vol-fader">
            <span class="vol-label">VOL</span>
            <input type="range" id="volume" class="vol-slider" min="0" max="1" step="0.05" value="0.8">
            <span class="vol-label">🔊</span>
        </div>
    </div>
    <div class="meta-display">
        <span id="artist">EN VIVO</span>
        <span id="title">Buscando señal...</span>
    </div>
    
    <div class="footer">
        <a href="https://wa.me/5493544316944" target="_blank" class="ws-btn">WHATSAPP</a>
        <div id="listeners">MANDANOS TU MENSAJE</div>
    </div>
    
    <div class="history-wrap">
        <button class="history-toggle" onclick="toggleHistory()">Historial +</button>
        <div id="history-content"><div id="history-list"></div></div>
    </div>
</div>
<audio id="player" crossorigin="anonymous"></audio>
<script>
const WORKER = "https://white-mud-e8b6.entresijoradio.workers.dev";

// ─── Referencias DOM ───────────────────────────────────────────
const btn           = document.getElementById("btn");
const player        = document.getElementById("player");
const ring          = document.getElementById("loading-ring");
const statusBadge   = document.getElementById("status-badge");
const canvas        = document.getElementById("vu-canvas");
const ctx           = canvas.getContext("2d");
const artistEl      = document.getElementById("artist");
const titleEl       = document.getElementById("title");
const descriptionEl = document.getElementById("description");
const historyList   = document.getElementById("history-list");

// ─── Estado de audio ───────────────────────────────────────────
let audioCtx    = null;
let analyser    = null;
let dataArray   = null;
let isPlaying   = false;
let isLoading   = false;
let animationId = null;

// ─── Estado de reconexión ──────────────────────────────────────
let userWantsToPlay  = false;
let reconnectTimer   = null;
let reconnectAttempt = 0;
const RECONNECT_BASE = 3000;
const RECONNECT_MAX  = 30000;

// ─── Stall watchdog ────────────────────────────────────────────
const STALL_LIMIT = 8000;
let stallTimer    = null;
let lastTime      = 0;

// ─── Pre-warm ──────────────────────────────────────────────────
let prewarmed = false;

async function prewarmConnection() {
    if (prewarmed) return;
    prewarmed = true;
    const controller = new AbortController();
    setTimeout(() => controller.abort(), 3000);
    try {
        await fetch(`${WORKER}/api/stream`, {
            signal: controller.signal,
            cache: 'no-store'
        });
    } catch (e) {
        // AbortError esperado, ignorar
    }
}

// ─── Pre-init AudioContext en primer gesto ─────────────────────
// Antes del click de play — reduce latencia al iniciar
function setupEarlyAudioInit() {
    const events = ['mousedown', 'touchstart', 'keydown'];
    const handler = async () => {
        if (audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 64;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            const source = audioCtx.createMediaElementSource(player);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            // Suspender inmediatamente — solo lo inicializamos, no reproducimos
            await audioCtx.suspend();
        } catch (e) {
            audioCtx = null; // reset si falla, se reintenta en play
        }
        events.forEach(ev => btn.removeEventListener(ev, handler));
    };
    events.forEach(ev => btn.addEventListener(ev, handler));
}

function startStallWatchdog() {
    stopStallWatchdog();
    lastTime = player.currentTime;
    stallTimer = setInterval(() => {
        if (!isPlaying) { stopStallWatchdog(); return; }
        if (player.currentTime === lastTime) {
            console.warn("[watchdog] stream estancado, reconectando...");
            handleStreamLost("stall");
        }
        lastTime = player.currentTime;
    }, STALL_LIMIT);
}

function stopStallWatchdog() {
    if (stallTimer) { clearInterval(stallTimer); stallTimer = null; }
}

// ─── Reloj ────────────────────────────────────────────────────
function updateClock() {
    document.getElementById("clock").innerText =
        new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// ─── Estado visual ─────────────────────────────────────────────
function setStatus(text, mode = "offline") {
    statusBadge.innerText = text;
    statusBadge.className = "";
    if (mode === "online")       statusBadge.classList.add("online");
    if (mode === "reconnecting") statusBadge.classList.add("reconnecting");
}

// ─── VU meter ─────────────────────────────────────────────────
function clearVu() { ctx.clearRect(0, 0, 170, 170); }
function drawVu() {
    if (!isPlaying || !analyser) { clearVu(); return; }
    animationId = requestAnimationFrame(drawVu);
    analyser.getByteFrequencyData(dataArray);
    const avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
    const limit = (avg / 255) * Math.PI * 2;
    clearVu();
    ctx.lineWidth = 4;
    ctx.strokeStyle = "#ff3b30";
    ctx.beginPath();
    ctx.arc(85, 85, 70, 0, limit);
    ctx.stroke();
}

// ─── Audio context ─────────────────────────────────────────────
async function initAudio() {
    if (audioCtx) {
        // Ya fue pre-inicializado, solo retomar
        if (audioCtx.state === "suspended") await audioCtx.resume();
        return;
    }
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 64;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    const source = audioCtx.createMediaElementSource(player);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
}

// ─── Metadata ─────────────────────────────────────────────────
async function fetchMeta() {
    try {
        const res = await fetch(`${WORKER}/api/radio-info?t=${Date.now()}`, { cache: "no-store" });
        if (!res.ok) throw new Error("meta error");
        const d = await res.json();

        descriptionEl.innerText = d.description || "RADIO SERRANA";

        if (d.isLive) {
            // Pre-warm: calentar conexión al stream en background
            prewarmConnection();

            if (userWantsToPlay && !isPlaying && !isLoading && !reconnectTimer) {
                scheduleReconnect();
            }
            if (!isPlaying && !isLoading) {
                setStatus("● AL AIRE", "online");
            }
            btn.disabled = false;
            artistEl.innerText = d.artist === "En vivo" ? "EN VIVO" : d.artist || "EN VIVO";
            titleEl.innerText  = d.title || "Entresijo Radio";

            if (Array.isArray(d.history)) {
                historyList.innerHTML = d.history.slice(0, 6).map(h => `
                    <div class="h-item">
                        <strong>${h.artist || ""}</strong>
                        ${h.title || ""}
                    </div>
                `).join('');
            }
        } else {
            if (!userWantsToPlay) {
                setStatus("FUERA DEL AIRE");
                btn.disabled = true;
            }
        }
    } catch (err) {
        console.error("[meta]", err);
        if (!isPlaying) setStatus("SIN SEÑAL");
    }
}

// ─── Reconexión con backoff ────────────────────────────────────
function cancelReconnect() {
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    reconnectAttempt = 0;
}

function scheduleReconnect() {
    if (!userWantsToPlay) return;
    if (reconnectTimer)   return;

    const delay = Math.min(RECONNECT_BASE * Math.pow(2, reconnectAttempt), RECONNECT_MAX);
    reconnectAttempt++;

    const segs = Math.round(delay / 1000);
    setStatus(`BUSCANDO SEÑAL${reconnectAttempt > 1 ? ` (${segs}s)` : '...'}`, "reconnecting");
    ring.style.display = "block";
    btn.innerText = "";
    btn.disabled = true;

    reconnectTimer = setTimeout(async () => {
        reconnectTimer = null;
        if (!userWantsToPlay) return;
        await startPlayer(true);
    }, delay);
}

// ─── Pérdida de stream ─────────────────────────────────────────
function handleStreamLost(reason) {
    console.warn("[stream perdido]", reason);
    stopStallWatchdog();
    isPlaying = false;
    player.pause();
    player.removeAttribute("src");
    player.load();
    clearVu();
    if (animationId) { cancelAnimationFrame(animationId); animationId = null; }

    if (userWantsToPlay) {
        scheduleReconnect();
    } else {
        btn.innerText = "▶";
        ring.style.display = "none";
        btn.disabled = false;
    }
}

// ─── Start / Stop ──────────────────────────────────────────────
async function startPlayer(isReconnect = false) {
    if (isLoading || isPlaying) return;
    isLoading = true;
    cancelReconnect();

    try {
        btn.disabled = true;
        btn.innerText = "";
        ring.style.display = "block";
        if (!isReconnect) setStatus("SINTONIZANDO...");

        await initAudio();

        player.src = `${WORKER}/api/stream?t=${Date.now()}`;
        player.volume = document.getElementById("volume").value;

        await player.play();

        isPlaying = true;
        reconnectAttempt = 0;
        btn.innerText = "⏸";
        setStatus("● AL AIRE", "online");
        startStallWatchdog();
        drawVu();

    } catch (err) {
        console.error("[start]", err);
        isPlaying = false;
        if (userWantsToPlay) {
            scheduleReconnect();
        } else {
            btn.innerText = "▶";
            setStatus("SEÑAL INTERRUMPIDA");
        }
    } finally {
        isLoading = false;
        if (isPlaying) { ring.style.display = "none"; btn.disabled = false; }
    }
}

function stopPlayer() {
    userWantsToPlay = false;
    cancelReconnect();
    stopStallWatchdog();
    isPlaying = false;
    player.pause();
    player.removeAttribute("src");
    player.load();
    btn.innerText = "▶";
    btn.disabled = false;
    ring.style.display = "none";
    clearVu();
    if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
    setStatus("● AL AIRE", "online");
}

// ─── Botón ─────────────────────────────────────────────────────
btn.addEventListener("click", async () => {
    if (isLoading) return;
    if (isPlaying) {
        stopPlayer();
    } else {
        userWantsToPlay = true;
        await startPlayer();
    }
});

// ─── Eventos del elemento audio ────────────────────────────────
player.addEventListener("error", () => {
    if (!isLoading) handleStreamLost("error");
});
player.addEventListener("ended", () => {
    handleStreamLost("ended");
});
player.addEventListener("waiting", () => {
    if (isPlaying) ring.style.display = "block";
});
player.addEventListener("playing", () => {
    ring.style.display = "none";
    startStallWatchdog();
});

// ─── Volumen ───────────────────────────────────────────────────
document.getElementById("volume").addEventListener("input", e => {
    player.volume = e.target.value;
});

// ─── Historial ─────────────────────────────────────────────────
function toggleHistory() {
    const content = document.getElementById("history-content");
    content.style.maxHeight = content.style.maxHeight === "600px" ? "0" : "600px";
}

// ─── Init ──────────────────────────────────────────────────────
setupEarlyAudioInit();
setInterval(fetchMeta, 15000);
fetchMeta();
</script>
</body>
</html>
