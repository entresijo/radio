<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entresijo Radio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff3b30; --bg: #050505; --card: #0c0c0c; --text: #ffffff; --text-dim: #555; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; display: flex; 
            justify-content: center; align-items: center; min-height: 100vh;
            padding: 20px;
        }

        .player-container {
            width: 100%; max-width: 350px; text-align: center;
        }

        /* 1. Header: Radio y Reloj */
        .top-info { margin-bottom: 40px; opacity: 0.8; }
        #station-name { font-weight: 800; font-size: 10px; letter-spacing: 3px; color: var(--primary); display: block; margin-bottom: 5px; }
        #clock { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }

        /* 2. Status Badge */
        #status-badge { 
            font-size: 9px; font-weight: 800; padding: 5px 15px; 
            border-radius: 20px; display: inline-block; margin-bottom: 30px;
            text-transform: uppercase; letter-spacing: 1.5px;
            border: 1px solid #222; transition: 0.5s;
        }
        .st-on { color: var(--primary); border-color: var(--primary) !important; box-shadow: 0 0 10px rgba(255,59,48,0.2); }

        /* 3. Control Central: Play y Volumen */
        .core-controls { 
            display: flex; align-items: center; justify-content: center; 
            gap: 30px; margin-bottom: 40px;
        }

        .play-wrap { position: relative; width: 120px; height: 120px; }
        
        /* Vúmetro Circular (Canvas) */
        #vu-canvas { 
            position: absolute; top: -10px; left: -10px; 
            transform: rotate(-90deg); z-index: 1;
        }

        .play-btn {
            position: relative; z-index: 10; width: 100%; height: 100%; 
            border-radius: 50%; background: #111; border: 1px solid #222;
            color: white; font-size: 30px; cursor: pointer; transition: 0.3s;
        }
        .play-btn:active { transform: scale(0.95); }

        /* Volumen Vertical Sutil */
        .vol-fader { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .vol-slider {
            appearance: slider-vertical; width: 3px; height: 100px;
            background: #1a1a1a; outline: none; border-radius: 2px; accent-color: var(--primary);
        }
        .vol-label { font-size: 8px; color: var(--text-dim); font-weight: 800; }

        /* 4. Now Playing */
        .now-playing { margin-bottom: 40px; }
        #artist { display: block; font-size: 11px; font-weight: 600; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        #title { display: block; font-size: 19px; font-weight: 300; line-height: 1.3; }

        /* 5. Historial Sutil */
        .history { border-top: 1px solid #151515; padding-top: 25px; }
        .history-title { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 15px; text-transform: uppercase; }
        .h-item { font-size: 11px; margin-bottom: 10px; opacity: 0.6; }
        .h-item strong { color: var(--primary); font-weight: 400; }
    </style>
</head>
<body>

<div class="player-container">
    <div class="top-info">
        <span id="station-name">ENTRESIJO RADIO</span>
        <div id="clock">00:00 — 00/00/00</div>
    </div>

    <div id="status-badge">Sin conexión</div>

    <div class="core-controls">
        <div class="play-wrap">
            <canvas id="vu-canvas" width="140" height="140"></canvas>
            <button id="btn" class="play-btn">▶</button>
        </div>

        <div class="vol-fader">
            <span class="vol-label">MAX</span>
            <input type="range" id="volume" class="vol-slider" min="0" max="1" step="0.05" value="0.8">
            <span class="vol-label">🔊</span>
        </div>
    </div>

    <div class="now-playing">
        <span id="artist">Radio Serrana</span>
        <span id="title">Cargando señal...</span>
    </div>

    <div class="history">
        <div class="history-title">Anteriores</div>
        <div id="history-list"></div>
    </div>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    const WORKER = "https://white-mud-e8b6.entresijoradio.workers.dev";
    const btn = document.getElementById("btn");
    const player = document.getElementById("player");
    const canvas = document.getElementById("vu-canvas");
    const ctx = canvas.getContext("2d");

    let isPlaying = false;
    let audioCtx, analyser, dataArray;

    function updateClock() {
        const now = new Date();
        const time = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const date = now.toLocaleDateString([], {day: '2-digit', month:'2-digit', year:'2-digit'});
        document.getElementById("clock").innerText = `${time} — ${date}`;
    }
    setInterval(updateClock, 1000); updateClock();

    // Dibujar Vúmetro Circular
    function drawVu() {
        if(!isPlaying) {
            ctx.clearRect(0,0,140,140);
            return;
        }
        requestAnimationFrame(drawVu);
        analyser.getByteFrequencyData(dataArray);
        
        ctx.clearRect(0,0,140,140);
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#ff3b30";
        
        const avg = dataArray.reduce((a,b) => a+b) / dataArray.length;
        const limit = (avg / 255) * Math.PI * 2;

        ctx.beginPath();
        ctx.arc(70, 70, 65, 0, limit);
        ctx.stroke();
    }

    async function fetchMeta() {
        try {
            const res = await fetch(`${WORKER}/api/radio-info`);
            const d = await res.json();
            document.getElementById("station-name").innerText = d.radioName || "ENTRESIJO RADIO";
            
            if(d.isLive) {
                document.getElementById("status-badge").innerText = "● EN EL AIRE";
                document.getElementById("status-badge").classList.add("st-on");
                document.getElementById("artist").innerText = d.artist;
                document.getElementById("title").innerText = d.title;
                
                if(d.history) {
                    document.getElementById("history-list").innerHTML = d.history.slice(0,3).map(h => `
                        <div class="h-item"><strong>${h.artist}</strong> — ${h.title}</div>
                    `).join('');
                }
            }
        } catch(e) {}
    }

    btn.onclick = async () => {
        if (!isPlaying) {
            if(!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaElementSource(player);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 64;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            
            btn.innerText = "⌛";
            player.src = `${WORKER}/api/stream?t=${Date.now()}`;
            try {
                await player.play();
                isPlaying = true;
                btn.innerText = "⏸";
                drawVu();
            } catch(e) { btn.innerText = "▶"; }
        } else {
            isPlaying = false;
            player.pause();
            player.src = "";
            btn.innerText = "▶";
            document.getElementById("status-badge").classList.remove("st-on");
        }
    };

    document.getElementById("volume").oninput = (e) => player.volume = e.target.value;
    setInterval(fetchMeta, 15000);
    fetchMeta();
</script>
</body>
</html>
