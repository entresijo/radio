<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entresijo Radio Noir</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #80130f; /* Rojo Entresijo Sangre */
            --bg: #050505;
            --card: #0c0c0c;
            --text: #ffffff;
            --text-dim: #555;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* Contenedor Blindado */
        .player-app {
            background: var(--card); width: 100%; max-width: 380px;
            border-radius: 40px; border: 1px solid #1a1a1a;
            padding: 40px; box-shadow: 0 40px 80px rgba(0,0,0,0.7);
            display: flex; flex-direction: column; align-items: center;
            text-align: center;
        }

        /* Header Centrado */
        .header { width: 100%; margin-bottom: 35px; }
        #station-name { 
            font-weight: 900; font-size: 14px; letter-spacing: 4px; 
            color: var(--primary); text-transform: uppercase; display: block;
            margin-bottom: 10px;
        }
        .clock { 
            font-size: 11px; color: var(--text-dim); 
            font-weight: 400; line-height: 1.5; letter-spacing: 1px;
        }

        /* Status Badge */
        #status-badge {
            font-size: 10px; font-weight: 900; padding: 6px 16px;
            border-radius: 4px; display: inline-block; margin-bottom: 40px;
            text-transform: uppercase; letter-spacing: 2px;
            border: 1px solid #222; color: #444; transition: all 0.4s var(--ease);
        }
        .st-on { 
            color: var(--primary) !important; border-color: var(--primary) !important;
            animation: glow-breath 3s infinite;
        }
        @keyframes glow-breath { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* Core UI: Play + Volumen */
        .core-ui { 
            display: flex; align-items: center; justify-content: center; 
            gap: 40px; margin-bottom: 50px; width: 100%;
        }

        .play-outer { position: relative; width: 140px; height: 140px; }
        
        /* Spinner e Interfaz de Carga */
        .loading-ring {
            position: absolute; top: -8px; left: -8px; right: -8px; bottom: -8px;
            border: 3px solid transparent; border-top-color: var(--primary);
            border-radius: 50%; display: none; animation: spin 1s linear infinite; z-index: 1;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #vu-canvas { position: absolute; top: -8px; left: -8px; z-index: 2; transform: rotate(-90deg); }

        .play-btn {
            position: relative; z-index: 10; width: 100%; height: 100%;
            border-radius: 50%; background: #111; border: 1px solid #222;
            color: white; font-size: 40px; cursor: pointer;
            transition: all 0.2s var(--ease);
            display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        /* Efecto Resorte */
        .play-btn:active { transform: scale(0.92); background: #151515; }
        .play-btn:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--primary); }
        .play-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Volumen Vertical */
        .vol-fader { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .vol-slider {
            appearance: slider-vertical; -webkit-appearance: slider-vertical;
            width: 5px; height: 120px; background: #1a1a1a;
            outline: none; border-radius: 10px; accent-color: var(--primary);
        }
        .vol-label { font-size: 9px; color: var(--text-dim); font-weight: 900; }

        /* Metadata */
        .meta-display { margin-bottom: 45px; min-height: 90px; width: 100%; }
        #artist { 
            display: block; font-size: 14px; font-weight: 700; 
            color: var(--primary); text-transform: uppercase; 
            letter-spacing: 2px; margin-bottom: 12px; 
        }
        #title { 
            display: block; font-size: 30px; font-weight: 200; 
            line-height: 1.2; color: #eee; 
        }

        /* Footer */
        .footer { 
            width: 100%; display: flex; justify-content: space-between; 
            border-top: 1px solid #151515; padding-top: 30px; align-items: center; 
        }
        .ws-btn { color: #25d366; text-decoration: none; font-size: 11px; font-weight: 900; letter-spacing: 1px; }
        #listeners { font-size: 10px; color: var(--text-dim); font-weight: 700; }

        /* Historial */
        .history { width: 100%; margin-top: 30px; text-align: left; }
        .h-title { font-size: 9px; color: var(--text-dim); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .h-item { font-size: 12px; margin-bottom: 15px; border-left: 2px solid #1a1a1a; padding-left: 15px; opacity: 0.7; }
        .h-item strong { color: var(--primary); font-weight: 400; display: block; font-size: 10px; margin-bottom: 3px; }

    </style>
</head>
<body>

<div class="player-app">
    <div class="header">
        <span id="station-name">ENTRESIJO RADIO</span>
        <div class="clock" id="clock">--:--<br>--/--/--</div>
    </div>

    <div id="status-badge">Detectando señal...</div>

    <div class="core-ui">
        <div class="play-outer">
            <div id="loading-ring" class="loading-ring"></div>
            <canvas id="vu-canvas" width="156" height="156"></canvas>
            <button id="btn" class="play-btn" disabled>▶</button>
        </div>

        <div class="vol-fader">
            <span class="vol-label">MAX</span>
            <input type="range" id="volume" class="vol-slider" min="0" max="1" step="0.05" value="0.8">
            <span class="vol-label">MIN</span>
        </div>
    </div>

    <div class="meta-display">
        <span id="artist">ENTRESIJO</span>
        <span id="title">Radio Serrana</span>
    </div>

    <div class="footer">
        <a href="https://wa.me/549XXXXXXXXXX" target="_blank" class="ws-btn">WHATSAPP</a>
        <div id="listeners">0 OYENTES</div>
    </div>

    <div class="history">
        <div class="h-title">Recientes</div>
        <div id="history-list"></div>
    </div>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
const WORKER = "https://white-mud-e8b6.entresijoradio.workers.dev";
const btn = document.getElementById("btn");
const ring = document.getElementById("loading-ring");
const statusBadge = document.getElementById("status-badge");
const canvas = document.getElementById("vu-canvas");
const ctx = canvas.getContext("2d");

let player = document.getElementById("player");
let isPlaying = false;
let isUserPaused = true;
let audioCtx, analyser, dataArray;
let silenceTimer = null; 
let streamStartTime = 0; // Referencia para la ventana de gracia

// 1. SOLUCIÓN AL RECUADRO NARANJA (Blur forzado)
function clearFocus() {
    btn.blur();
    if (window.getSelection) { window.getSelection().removeAllRanges(); }
}

// 2. RECONSTRUCCIÓN NUCLEAR DEL REPRODUCTOR
function rebuildPlayer() {
    if (player) {
        player.pause();
        player.src = "";
        player.load();
        player.remove();
    }
    const newPlayer = document.createElement('audio');
    newPlayer.id = "player";
    newPlayer.crossOrigin = "anonymous";
    document.body.appendChild(newPlayer);
    player = newPlayer;
    
    // Re-vincular eventos de estabilidad
    player.onwaiting = () => { if(!isUserPaused) statusBadge.innerText = "BUFFERING..."; };
    player.onstalled = () => { if(!isUserPaused) startStream(); };
    player.onerror = () => { if(!isUserPaused) setTimeout(startStream, 3000); };
}

// 3. MEDIA SESSION API (Prioridad en segundo plano)
function updateMediaSession() {
    if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
            title: 'Radio Serrana',
            artist: 'ENTRESIJO RADIO',
            album: 'En Vivo',
            artwork: [
                { src: 'https://placehold.co/512x512/0c0c0c/80130f?text=ENTRESIJO', sizes: '512x512', type: 'image/png' }
            ]
        });
        navigator.mediaSession.setActionHandler('play', () => { isUserPaused = false; startStream(); });
        navigator.mediaSession.setActionHandler('pause', () => { isUserPaused = true; resetPlayer(); });
    }
}

// 4. DETECCIÓN DE RED (Sistema Operativo)
window.addEventListener('online', () => {
    if (!isUserPaused) {
        statusBadge.innerText = "RED DETECTADA...";
        setTimeout(startStream, 1500);
    }
});
window.addEventListener('offline', () => {
    statusBadge.innerText = "SIN CONEXIÓN";
});

// 5. MOTOR DE REPRODUCCIÓN REFORZADO
async function startStream() {
    if (isUserPaused) return;
    
    rebuildPlayer(); 
    ring.style.display = "block";
    btn.innerText = "";
    statusBadge.innerText = "CONECTANDO...";
    
    player.src = `${WORKER}/api/stream?t=${Date.now()}`;
    
    try {
        await player.play();
        
        // Desbloqueo de AudioContext (crítico para el Vúmetro en móviles)
        if (audioCtx && audioCtx.state === 'suspended') {
            await audioCtx.resume();
        }
        
        isPlaying = true;
        streamStartTime = Date.now(); // Inicia reloj de gracia
        btn.innerText = "⏸";
        ring.style.display = "none";
        statusBadge.innerText = "● EN EL AIRE";
        updateMediaSession();
        drawVu();
    } catch(e) {
        console.error("Fallo de reproducción:", e);
        resetPlayer();
        statusBadge.innerText = "REINTENTANDO...";
        // Reintento espaciado para evitar bucles infinitos de error
        setTimeout(() => { if(!isUserPaused) startStream(); }, 5000);
    }
}

function resetPlayer() {
    isPlaying = false;
    if (player) {
        player.pause();
        player.src = "";
        player.load();
    }
    btn.innerText = "▶";
    ring.style.display = "none";
    clearTimeout(silenceTimer);
    silenceTimer = null;
    ctx.clearRect(0,0,156,156);
}

// 6. LÓGICA DEL BOTÓN
btn.onclick = async () => {
    clearFocus();
    
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaElementSource(player);
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        analyser.fftSize = 64;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
    }

    if (player.paused) {
        isUserPaused = false;
        await startStream();
    } else {
        isUserPaused = true;
        statusBadge.innerText = "● PAUSA";
        resetPlayer();
    }
};

// 7. VÚMETRO + WATCHDOG (Con ventana de gracia)
function drawVu() {
    if(!isPlaying || isUserPaused) { 
        ctx.clearRect(0,0,156,156); 
        clearTimeout(silenceTimer);
        silenceTimer = null;
        return; 
    }
    
    requestAnimationFrame(drawVu);
    analyser.getByteFrequencyData(dataArray);
    
    const avg = dataArray.reduce((a,b) => a+b) / dataArray.length;

    // --- WATCHDOG REFORZADO ---
    // Solo evalúa el silencio si ya pasaron 10 segundos de carga (Ventana de Gracia)
    const gracePeriodPassed = (Date.now() - streamStartTime) > 10000;

    if (gracePeriodPassed && avg < 0.2) { 
        if (!silenceTimer) {
            silenceTimer = setTimeout(() => {
                if(!isUserPaused) {
                    console.log("Watchdog detectó stream muerto tras periodo de gracia.");
                    statusBadge.innerText = "RECONECTANDO SEÑAL...";
                    startStream(); 
                }
            }, 10000); // 10 segundos extra de margen antes de reiniciar
        }
    } else {
        clearTimeout(silenceTimer);
        silenceTimer = null;
    }

    ctx.clearRect(0,0,156,156);
    ctx.lineWidth = 4; ctx.strokeStyle = "#80130f";
    const limit = (avg / 255) * Math.PI * 2;
    ctx.beginPath();
    ctx.arc(78, 78, 74, 0, limit);
    ctx.stroke();
}

// 8. KEEP-ALIVE AL WORKER
setInterval(() => {
    if (isPlaying && !isUserPaused) {
        fetch(`${WORKER}/api/radio-info`).catch(() => {});
    }
}, 12000);

// Metadata y Reloj
function updateClock() {
    const now = new Date();
    const time = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    const date = now.toLocaleDateString([], {day: '2-digit', month: '2-digit', year: '2-digit'});
    document.getElementById("clock").innerHTML = `${time}<br>${date}`;
}
setInterval(updateClock, 1000); updateClock();

async function fetchMeta() {
    try {
        const res = await fetch(`${WORKER}/api/radio-info`);
        const d = await res.json();
        if(d.isLive) {
            statusBadge.classList.add("st-on");
            btn.disabled = false;
            document.getElementById("artist").innerText = d.artist || "ENTRESIJO";
            document.getElementById("title").innerText = d.title || "Radio Serrana";
            document.getElementById("listeners").innerText = `${d.listeners || 0} OYENTES`;
            if(d.history) {
                document.getElementById("history-list").innerHTML = d.history.slice(0,3).map(h => `
                    <div class="h-item"><strong>${h.time || '--:--'} | ${h.artist}</strong> ${h.title}</div>
                `).join('');
            }
        }
    } catch(e) { console.warn("Fallo fetch metadata"); }
}

setInterval(fetchMeta, 15000); fetchMeta();
document.getElementById("volume").oninput = (e) => { if(player) player.volume = e.target.value; };
</script>

</body>
</html>
