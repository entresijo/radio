<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entresijo Radio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff3b30; --bg: #000000; --card: #0a0a0a; --text: #ffffff; --text-dim: #555; }

        /* --- RESET TOTAL ANTI-NARANJA Y ANTI-AZUL --- */
        * {
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
            box-shadow: none !important;
        }

        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; display: flex; 
            justify-content: center; align-items: center; min-height: 100vh;
            padding: 20px; overflow-x: hidden;
        }

        .player-app { width: 100%; max-width: 440px; text-align: center; }

        /* Header */
        .top-bar { margin-bottom: 40px; }
        #station-name { font-weight: 800; font-size: 15px; letter-spacing: 5px; color: var(--primary); display: block; margin-bottom: 10px; text-transform: uppercase; }
        #description { font-size: 11px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; display: block; }
        #clock { font-size: 12px; color: var(--text-dim); letter-spacing: 1px; }

        /* Badge con Atenuación Sutil */
        #status-badge { 
            font-size: 12px; font-weight: 800; padding: 10px 25px; 
            border-radius: 4px; display: inline-block; margin-bottom: 40px;
            text-transform: uppercase; letter-spacing: 3px;
            border: 1px solid #222; color: #444; transition: 0.4s;
        }
        #status-badge.online { 
            color: var(--primary); 
            border-color: var(--primary); 
            animation: glow-breath 2.5s infinite ease-in-out;
        }

        @keyframes glow-breath {
            0%, 100% { opacity: 0.5; box-shadow: 0 0 5px rgba(255, 59, 48, 0.1); }
            50% { opacity: 1; box-shadow: 0 0 25px rgba(255, 59, 48, 0.4); }
        }

        /* Core UI */
        .core-ui { display: flex; align-items: center; justify-content: center; gap: 40px; margin-bottom: 50px; }
        .play-outer { position: relative; width: 140px; height: 140px; }

        .loading-ring {
            position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 4px solid transparent; border-top-color: var(--primary);
            border-radius: 50%; display: none; animation: spin 1s linear infinite; z-index: 1;
        }

        #vu-canvas { position: absolute; top: -10px; left: -10px; z-index: 2; transform: rotate(-90deg); }

        .play-btn {
            position: relative; z-index: 10; width: 100%; height: 100%; 
            border-radius: 50%; background: #111; border: 1px solid #222;
            color: white; font-size: 45px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .play-btn:active { transform: scale(0.95); }
        .play-btn:disabled { opacity: 0.1; }

        /* VOLUMEN CORREGIDO (Gris a Rojo) */
        .vol-fader { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .vol-slider {
            -webkit-appearance: slider-vertical;
            appearance: slider-vertical;
            width: 12px; height: 150px;
            background: linear-gradient(to top, #222 0%, var(--primary) 100%);
            border-radius: 10px; cursor: pointer;
        }
        /* Estilo del "pulgar" para asegurar que deslice en todo navegador */
        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 24px; height: 12px; background: #fff; border-radius: 2px;
        }

        .vol-label { font-size: 10px; color: var(--text-dim); font-weight: 800; letter-spacing: 2px; }

        /* Metadata */
        .meta-display { margin-bottom: 50px; }
        #artist { display: block; font-size: 14px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 12px; }
        #title { display: block; font-size: 30px; font-weight: 200; line-height: 1.2; }

        /* Historial */
        .history-wrap { text-align: left; border-top: 1px solid #111; padding-top: 20px; }
        .history-toggle { background: none; border: none; color: var(--text-dim); font-size: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        #history-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; margin-top: 15px; }
        .h-item { font-size: 13px; margin-bottom: 15px; border-left: 2px solid #1a1a1a; padding-left: 12px; opacity: 0.7; }
        .h-item strong { color: var(--primary); font-weight: 600; display: block; font-size: 10px; margin-bottom: 3px; }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="player-app">
    <div class="top-bar">
        <span id="station-name">ENTRESIJO RADIO</span>
        <span id="description">Cargando descripción...</span>
        <div id="clock">--:-- — --/--/--</div>
    </div>

    <div id="status-badge">Detectando señal...</div>

    <div class="core-ui">
        <div class="play-outer">
            <div id="loading-ring" class="loading-ring"></div>
            <canvas id="vu-canvas" width="160" height="160"></canvas>
            <button id="btn" class="play-btn" disabled>▶</button>
        </div>

        <div class="vol-fader">
            <span class="vol-label">VOL</span>
            <input type="range" id="volume" class="vol-slider" min="0" max="1" step="0.05" value="0.8">
            <span class="vol-label">🔊</span>
        </div>
    </div>

    <div class="meta-display">
        <span id="artist">ENTRESIJO</span>
        <span id="title">Radio Serrana</span>
    </div>

    <div class="history-wrap">
        <button class="history-toggle" onclick="toggleHistory()">Historial +</button>
        <div id="history-content">
            <div id="history-list"></div>
        </div>
    </div>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    const WORKER = "https://white-mud-e8b6.entresijoradio.workers.dev";
    const btn = document.getElementById("btn");
    const player = document.getElementById("player");
    const ring = document.getElementById("loading-ring");
    const statusBadge = document.getElementById("status-badge");
    const canvas = document.getElementById("vu-canvas");
    const ctx = canvas.getContext("2d");

    let isPlaying = false;
    let audioCtx, analyser, dataArray;

    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + " — " + now.toLocaleDateString([], {day: '2-digit', month:'2-digit', year:'2-digit'});
    }
    setInterval(updateClock, 1000); updateClock();

    function drawVu() {
        if(!isPlaying) { ctx.clearRect(0,0,160,160); return; }
        requestAnimationFrame(drawVu);
        analyser.getByteFrequencyData(dataArray);
        ctx.clearRect(0,0,160,160);
        ctx.lineWidth = 4; ctx.strokeStyle = "#ff3b30";
        const avg = dataArray.reduce((a,b) => a+b) / dataArray.length;
        const limit = (avg / 255) * Math.PI * 2;
        ctx.beginPath(); ctx.arc(80, 80, 76, 0, limit); ctx.stroke();
    }

    async function fetchMeta() {
        try {
            const res = await fetch(`${WORKER}/api/radio-info`);
            const d = await res.json();
            document.getElementById("station-name").innerText = d.radioName || "ENTRESIJO RADIO";
            document.getElementById("description").innerText = d.description || "";

            if(d.isLive) {
                statusBadge.innerText = "● EN EL AIRE";
                statusBadge.classList.add("online");
                btn.disabled = false;
                
                // Cambio solicitado: "En vivo" -> "ESCUCHANDO AHORA"
                document.getElementById("artist").innerText = (d.artist === "En vivo") ? "ESCUCHANDO AHORA" :
