<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entresijo</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container { text-align:center; width:90%; max-width:400px; }

.onair {
  padding:6px 14px;
  border-radius:20px;
  margin-bottom:20px;
}
.on { background:red; }
.off { background:#00c853; color:black; }

.play-btn {
  width:120px;
  height:120px;
  border-radius:50%;
  background:red;
  border:none;
  color:white;
  font-size:40px;
}

.track { margin-top:20px; font-weight:bold; }
.listeners { font-size:0.8em; opacity:0.7; }
</style>
</head>

<body>

<div class="container">

<h1>🎵 Entresijo</h1>

<div id="onair" class="onair off">● FUERA DEL AIRE</div>

<button id="btn" class="play-btn">▶</button>

<div id="track">—</div>
<div id="listeners"></div>
<div id="streamURL"></div>
  
<audio id="player"></audio>

</div>

<script>

const STREAM_FALLBACK = "https://uk15freenew.listen2myradio.com/live.mp3?typeportmount=ice_4243_stream_737103432"
const META_URL        = "https://spring-sun-cde9.entresijoradio.workers.dev/"

const btn       = document.getElementById("btn")
const player    = document.getElementById("player")
const onair     = document.getElementById("onair")
const track     = document.getElementById("track")
const listeners = document.getElementById("listeners")

let playing   = false
let playProm  = null
let streamURL = STREAM_FALLBACK

function setOnAir(state) {
  onair.className = state ? "onair on" : "onair off"
  onair.innerText = state ? "● EN EL AIRE" : "● FUERA DEL AIRE"
}

async function load() {
  try {
    const res  = await fetch(META_URL, { cache: "no-store" })
    const data = await res.json()

    if (data.error || !data.song) {
      setOnAir(false)
      return
    }

    if (data.stream && data.stream.length > 10) {
      streamURL = data.stream
    }

    setOnAir(true)
    track.innerText     = data.song
    listeners.innerText = data.listeners ? "👥 " + data.listeners : ""

  } catch(e) {
    console.error("metadata:", e)
    setOnAir(false)
  }
}

btn.addEventListener("click", async () => {
  if (!playing) {
    player.src = streamURL
    btn.innerText = "⏸"
    playing   = true
    playProm  = player.play()
    try {
      await playProm
    } catch(e) {
      if (e.name !== "AbortError") {
        track.innerText = "error al reproducir"
        btn.innerText   = "▶"
        playing = false
      }
    }
  } else {
    playing  = false
    playProm = null
    player.pause()
    btn.innerText = "▶"
  }
})

player.addEventListener("error", () => {
  track.innerText = "stream no disponible"
  btn.innerText   = "▶"
  playing = false
})

setInterval(load, 15000)
load()

</script>

</body>
</html>
