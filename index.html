<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entresijo Radio Noir</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #80130f; /* Rojo Entresijo Sangre */
            --bg: #050505;
            --card: #0c0c0c;
            --text: #ffffff;
            --text-dim: #555;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* Contenedor Estilo App Premium */
        .player-app {
            background: var(--card); width: 100%; max-width: 360px;
            border-radius: 40px; border: 1px solid #1a1a1a;
            padding: 35px; box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center;
            position: relative; overflow: hidden;
        }

        /* Header */
        .header { width: 100%; display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
        #station-name { font-weight: 900; font-size: 11px; letter-spacing: 3px; color: var(--primary); text-transform: uppercase; }
        .clock { font-size: 10px; color: var(--text-dim); text-align: right; font-weight: 400; line-height: 1.4; letter-spacing: 1px; }

        /* Badge de Estado */
        #status-badge {
            font-size: 9px; font-weight: 900; padding: 6px 14px;
            border-radius: 4px; display: inline-block; margin-bottom: 35px;
            text-transform: uppercase; letter-spacing: 2px;
            border: 1px solid #222; color: var(--text-dim);
            transition: var(--transition);
        }
        .st-on { 
            color: var(--primary) !important; border-color: var(--primary) !important;
            animation: glow-breath 3s infinite;
        }
        @keyframes glow-breath { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* Bloque Central de Control */
        .core-ui { display: flex; align-items: center; justify-content: center; gap: 35px; margin-bottom: 45px; width: 100%; }

        .play-outer { position: relative; width: 140px; height: 140px; flex-shrink: 0; }
        
        /* Spinner Perimetral */
        .loading-ring {
            position: absolute; top: -8px; left: -8px; right: -8px; bottom: -8px;
            border: 3px solid transparent; border-top-color: var(--primary);
            border-radius: 50%; display: none; animation: spin 1s linear infinite; z-index: 1;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Vúmetro Circular */
        #vu-canvas { position: absolute; top: -8px; left: -8px; z-index: 2; transform: rotate(-90deg); pointer-events: none; }

        .play-btn {
            position: relative; z-index: 10; width: 100%; height: 100%;
            border-radius: 50%; background: #111; border: 1px solid #222;
            color: white; font-size: 38px; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        /* Efecto Resorte y Hundimiento */
        .play-btn:active { transform: scale(0.92); background: #151515; }
        .play-btn:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--primary); }

        /* Volumen Vertical */
        .vol-fader { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .vol-slider {
            appearance: slider-vertical; -webkit-appearance: slider-vertical;
            width: 4px; height: 110px; background: #1a1a1a;
            outline: none; border-radius: 10px; accent-color: var(--primary);
            cursor: pointer;
        }
        .vol-label { font-size: 9px; color: var(--text-dim); font-weight: 900; }

        /* Metadata Now Playing */
        .meta-display { text-align: center; width: 100%; margin-bottom: 40px; min-height: 85px; }
        #artist { display: block; font-size: 13px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        #title { display: block; font-size: 28px; font-weight: 200; line-height: 1.2; color: #eee; }

        /* Footer con Utilidades */
        .footer { width: 100%; display: flex; justify-content: space-between; border-top: 1px solid #151515; padding-top: 25px; align-items: center; }
        .ws-btn { color: #25d366; text-decoration: none; font-size: 10px; font-weight: 900; letter-spacing: 1px; transition: opacity 0.3s; }
        .ws-btn:hover { opacity: 0.7; }
        #listeners { font-size: 10px; color: var(--text-dim); font-weight: 700; }

        /* Historial */
        .history { width: 100%; margin-top: 25px; text-align: left; }
        .h-title { font-size: 9px; color: var(--text-dim); font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        .h-item { font-size: 12px; margin-bottom: 12px; border-left: 2px solid #1a1a1a; padding-left: 12px; opacity: 0.6; }
        .h-item strong { color: var(--primary); font-weight: 400; display: block; font-size: 10px; margin-bottom: 2px; }

    </style>
</head>
<body>

<div class="player-app">
    <div class="header">
        <div class="station-info">
            <span id="station-name">Entresijo Radio</span>
        </div>
        <div class="clock" id="clock">--:--<br>--/--/--</div>
    </div>

    <div id="status-badge">Detectando señal...</div>

    <div class="core-ui">
        <div class="play-outer">
            <div id="loading-ring" class="loading-ring"></div>
            <canvas id="vu-canvas" width="156" height="156"></canvas>
            <button id="btn" class="play-btn" disabled>▶</button>
        </div>

        <div class="vol-fader">
            <span class="vol-label">MAX</span>
            <input type="range" id="volume" class="vol-slider" min="0" max="1" step="0.05" value="0.8">
            <span class="vol-label">VOL</span>
        </div>
    </div>

    <div class="meta-display">
        <span id="artist">ENTRESIJO</span>
        <span id="title">Radio Serrana</span>
    </div>

    <div class="footer">
        <a href="https://wa.me/549XXXXXXXXXX" target="_blank" class="ws-btn">WHATSAPP</a>
        <div id="listeners">0 OYENTES</div>
    </div>

    <div class="history">
        <div class="h-title">Recientes</div>
        <div id="history-list"></div>
    </div>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    const WORKER = "https://white-mud-e8b6.entresijoradio.workers.dev";
    const btn = document.getElementById("btn");
    const player = document.getElementById("player");
    const ring = document.getElementById("loading-ring");
    const statusBadge = document.getElementById("status-badge");
    const canvas = document.getElementById("vu-canvas");
    const ctx = canvas.getContext("2d");

    let isPlaying = false;
    let isUserPaused = true;
    let audioCtx, analyser, dataArray;

    // Reloj
    function updateClock() {
        const now = new Date();
        const time = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const date = now.toLocaleDateString([], {day: '2-digit', month: '2-digit', year: '2-digit'});
        document.getElementById("clock").innerHTML = `${time}<br>${date}`;
    }
    setInterval(updateClock, 1000); updateClock();

    // Vúmetro Circular
    function drawVu() {
        if(!isPlaying) { ctx.clearRect(0,0,156,156); return; }
        requestAnimationFrame(drawVu);
        analyser.getByteFrequencyData(dataArray);
        
        ctx.clearRect(0,0,156,156);
        ctx.lineWidth = 4;
        ctx.strokeStyle = "#80130f";
        
        const avg = dataArray.reduce((a,b) => a+b) / dataArray.length;
        const limit = (avg / 255) * Math.PI * 2;

        ctx.beginPath();
        ctx.arc(78, 78, 74, 0, limit);
        ctx.stroke();
    }

    async function fetchMeta() {
        try {
            const res = await fetch(`${WORKER}/api/radio-info`);
            const d = await res.json();
            
            if(d.isLive) {
                statusBadge.classList.add("st-on");
                statusBadge.innerText = isPlaying ? "● EN EL AIRE" : (isUserPaused ? "● PAUSA" : "● EN EL AIRE");
                btn.disabled = false;
                document.getElementById("artist").innerText = d.artist || "ENTRESIJO";
                document.getElementById("title").innerText = d.title || "Radio Serrana";
                document.getElementById("listeners").innerText = `${d.listeners || 0} OYENTES`;
                
                if(d.history) {
                    document.getElementById("history-list").innerHTML = d.history.slice(0,3).map(h => `
                        <div class="h-item"><strong>${h.artist}</strong> ${h.title}</div>
                    `).join('');
                }
            } else {
                statusBadge.innerText = "OFFLINE";
                statusBadge.classList.remove("st-on");
                btn.disabled = true;
                document.getElementById("title").innerText = "Transmisión Pausada";
            }
        } catch(e) { statusBadge.innerText = "Error de Señal"; }
    }

    async function startStream() {
        if (isUserPaused) return;
        ring.style.display = "block";
        btn.innerText = "";
        statusBadge.innerText = "CONECTANDO...";
        
        player.src = `${WORKER}/api/stream?t=${Date.now()}`;
        try {
            await player.play();
            isPlaying = true;
            btn.innerText = "⏸";
            ring.style.display = "none";
            statusBadge.innerText = "● EN EL AIRE";
            drawVu();
        } catch(e) {
            resetPlayer();
        }
    }

    function resetPlayer() {
        isPlaying = false;
        player.pause();
        player.src = "";
        player.load();
        btn.innerText = "▶";
        ring.style.display = "none";
        ctx.clearRect(0,0,156,156);
    }

    btn.onclick = async () => {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaElementSource(player);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 64;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }

        if (player.paused) {
            isUserPaused = false;
            await startStream();
        } else {
            isUserPaused = true;
            statusBadge.innerText = "● PAUSA";
            resetPlayer();
        }
    };

    // Auto-reconexión ante errores
    player.onerror = () => { if(!isUserPaused) setTimeout(startStream, 3000); };
    player.onstalled = () => { if(!isUserPaused) setTimeout(startStream, 3000); };

    document.getElementById("volume").oninput = (e) => player.volume = e.target.value;
    
    setInterval(fetchMeta, 15000);
    fetchMeta();
</script>

</body>
</html>
