<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entresijo</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 400px;
  text-align: center;
}

.onair {
  padding: 6px 14px;
  border-radius: 20px;
  margin-bottom: 20px;
}

.onair.on { background: red; }
.onair.off { background: #00c853; color: black; }

.play-btn {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: red;
  border: none;
  color: white;
  font-size: 40px;
  cursor: pointer;
}

.status { margin-top: 10px; }
.track { margin-top: 20px; font-weight: bold; }
.listeners { font-size: 0.85em; opacity: 0.7; }

audio {
  width: 100%;
  margin-top: 20px;
  filter: invert(1);
}
</style>
</head>

<body>

<div class="container">

<h1>🎵 Entresijo</h1>

<div id="onair" class="onair off">● FUERA DEL AIRE</div>

<button id="btn" class="play-btn">▶</button>

<div id="status" class="status">listo</div>

<div id="track" class="track">—</div>
<div id="listeners" class="listeners"></div>

<audio id="player" controls></audio>

</div>

<script>

/* ========= CONFIG ========= */

const STREAM_URL = "https://uk15freenew.listen2myradio.com/live.mp3?typeportmount=ice_4243_stream_737103432"
const ICECAST_URL = "http://uk15freenew.listen2myradio.com:4243/"
const PROXY = "https://proxy.corsfix.com/?"

/* ========= ELEMENTOS ========= */

const player = document.getElementById("player")
const btn = document.getElementById("btn")
const status = document.getElementById("status")
const onair = document.getElementById("onair")
const track = document.getElementById("track")
const listeners = document.getElementById("listeners")

/* DEBUG EN PANTALLA */
const debugDiv = document.createElement("div")
debugDiv.style.fontSize = "11px"
debugDiv.style.marginTop = "10px"
debugDiv.style.opacity = "0.6"
document.querySelector(".container").appendChild(debugDiv)

function debug(msg){
  console.log(msg)
  debugDiv.innerText = msg
}

let playing = false

/* ========= UI ========= */

function setOnAir(state){
  if(state === "on"){
    onair.className = "onair on"
    onair.innerText = "● EN EL AIRE"
  } else {
    onair.className = "onair off"
    onair.innerText = "● FUERA DEL AIRE"
  }
}

/* ========= PLAYER ========= */

btn.onclick = () => {
  if(!playing){
    player.src = STREAM_URL
    player.play()
    btn.innerHTML = "⏸"
    status.innerText = "conectando..."
    playing = true
  } else {
    player.pause()
    btn.innerHTML = "▶"
    status.innerText = "pausado"
    playing = false
  }
}

player.onplaying = () => status.innerText = "reproduciendo"
player.onwaiting = () => status.innerText = "cargando..."
player.onerror = () => status.innerText = "error"

/* ========= FETCH ICECAST ========= */

async function fetchIcecast(){

  debug("Fetching...")

  try{
    const url = PROXY + encodeURIComponent(ICECAST_URL)
    debug("URL: " + url)

    const res = await fetch(url)

    debug("Status HTTP: " + res.status)

    const html = await res.text()

    debug("HTML recibido: " + html.substring(0, 200))

    if(html.includes("Icecast Status")){
      setOnAir("on")
      debug("Detectado Icecast OK")
    } else {
      setOnAir("off")
      debug("NO es Icecast")
    }

    parseHTML(html)

  } catch(e){
    debug("ERROR FETCH: " + e.message)
    setOnAir("off")
    track.innerText = "sin datos"
    listeners.innerText = ""
  }
}

/* ========= PARSER ========= */

function parseHTML(html){

  const song = html.match(/Current Song:<\/td><td[^>]*>(.*?)<\/td>/i)
  const listen = html.match(/Listeners \(current\):<\/td><td[^>]*>(\d+)/i)

  debug("Song match: " + (song ? song[1] : "null"))
  debug("Listeners match: " + (listen ? listen[1] : "null"))

  track.innerText = song ? song[1] : "—"
  listeners.innerText = listen ? "👥 " + listen[1] + " oyentes" : ""
}

/* ========= LOOP ========= */

setInterval(fetchIcecast, 15000)
fetchIcecast()

</script>

</body>
</html>
