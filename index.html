<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entresijo Radio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-red: #ff3b30;
            --bg-color: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --on-air: #00c853;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 350px;
            padding: 30px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        /* Badge de Estado */
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live {
            background: rgba(0, 200, 83, 0.15);
            color: var(--on-air);
            border: 1px solid var(--on-air);
        }

        .offline {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            border: 1px solid #333;
        }

        /* Botón de Play */
        .play-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--primary-red);
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 59, 48, 0.3);
            transition: transform 0.2s, background 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
            outline: none;
        }

        .play-btn:active {
            transform: scale(0.92);
        }

        .play-btn.playing {
            background: #fff;
            color: #000;
        }

        /* Información de la pista */
        .track-info {
            min-height: 50px;
            margin-bottom: 10px;
        }

        #track {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.4;
            display: block;
            margin-bottom: 8px;
        }

        .meta-extra {
            font-size: 0.85rem;
            color: var(--text-dim);
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        /* Animación simple cuando está sonando */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        .is-playing-now {
            animation: pulse 2s infinite ease-in-out;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Entresijo Radio</h1>

    <div id="status" class="status-badge offline">● Desconectado</div>

    <button id="btn" class="play-btn">▶</button>

    <div class="track-info">
        <span id="track">Cargando...</span>
        <div class="meta-extra">
            <span id="listeners"></span>
        </div>
    </div>
    
    <audio id="player" preload="none"></audio>
</div>

<script>
    // --- CONFIGURACIÓN ---
    const WORKER_URL = "https://white-mud-e8b6.entresijoradio.workers.dev";
    const STREAM_URL = `${WORKER_URL}/api/stream`;
    const INFO_URL   = `${WORKER_URL}/api/radio-info`;

    const btn       = document.getElementById("btn");
    const player    = document.getElementById("player");
    const statusTag = document.getElementById("status");
    const track     = document.getElementById("track");
    const listeners = document.getElementById("listeners");

    let isPlaying = false;

    // Actualiza la interfaz según si hay señal o no
    function updateUI(data) {
        if (data.isLive) {
            statusTag.className = "status-badge live";
            statusTag.innerText = "● EN EL AIRE";
            track.innerText = data.nowPlaying || "Transmisión en vivo";
            listeners.innerText = data.listeners !== undefined ? `👥 ${data.listeners} oyentes` : "";
        } else {
            statusTag.className = "status-badge offline";
            statusTag.innerText = "● FUERA DEL AIRE";
            track.innerText = "Radio fuera de línea";
            listeners.innerText = "";
        }
    }

    // Carga la metadata del Worker
    async function fetchMetadata() {
        try {
            const res = await fetch(INFO_URL, { cache: "no-store" });
            const data = await res.json();
            updateUI(data);
        } catch (e) {
            console.error("Error metadata:", e);
            statusTag.className = "status-badge offline";
            statusTag.innerText = "● Error de conexión";
        }
    }

    // Manejo del botón Play/Pause
    btn.addEventListener("click", () => {
        if (!isPlaying) {
            // Iniciar reproducción
            player.src = STREAM_URL;
            player.play().then(() => {
                isPlaying = true;
                btn.innerText = "⏸";
                btn.classList.add("playing");
                track.classList.add("is-playing-now");
            }).catch(err => {
                console.error("Error al reproducir:", err);
                track.innerText = "Error al conectar stream";
            });
        } else {
            // Detener reproducción
            player.pause();
            player.src = ""; // Liberar recursos y evitar descarga en segundo plano
            isPlaying = false;
            btn.innerText = "▶";
            btn.classList.remove("playing");
            track.classList.remove("is-playing-now");
        }
    });

    // Errores del reproductor
    player.addEventListener("error", () => {
        track.innerText = "Stream no disponible";
        isPlaying = false;
        btn.innerText = "▶";
        btn.classList.remove("playing");
    });

    // Intervalo de actualización de metadata (cada 15 segundos)
    setInterval(fetchMetadata, 15000);
    fetchMetadata(); // Carga inicial
</script>

</body>
</html>
