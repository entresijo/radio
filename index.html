<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entresijo Radio Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff3b30; --bg: #0a0a0a; --card: #161616; --text: #ffffff; --text-dim: #666; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; display: flex; 
            justify-content: center; align-items: center; min-height: 100vh;
        }

        /* Contenedor Principal */
        .player-card {
            background: var(--card); border-radius: 32px; padding: 30px;
            border: 1px solid #222; display: flex; gap: 25px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6); position: relative;
        }

        /* Panel Izquierdo: Control e Info */
        .main-controls { width: 280px; text-align: center; }

        .status-badge {
            font-size: 0.65rem; font-weight: 900; padding: 5px 12px;
            border-radius: 6px; display: inline-block; margin-bottom: 20px;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .st-offline { background: #222; color: #555; }
        .st-connecting { background: #ca8a04; color: white; }
        .st-online { background: var(--primary); color: white; box-shadow: 0 0 15px rgba(255,59,48,0.4); }

        /* Vúmetro Real */
        .vumetro {
            display: flex; align-items: flex-end; justify-content: center;
            gap: 3px; height: 40px; margin-bottom: 20px;
        }
        .bar { width: 4px; background: var(--primary); border-radius: 2px; height: 5%; transition: height 0.1s ease; }

        /* Botón de Play con Spinner */
        .btn-container { position: relative; width: 110px; height: 110px; margin: 0 auto 25px; }
        .play-btn {
            width: 100%; height: 100%; border-radius: 50%;
            background: var(--primary); border: none; color: white;
            font-size: 38px; cursor: pointer; position: relative; z-index: 5;
            transition: transform 0.2s;
        }
        .play-btn:active { transform: scale(0.95); }
        
        .spinner {
            position: absolute; top: -6px; left: -6px; right: -6px; bottom: -6px;
            border: 3px solid transparent; border-top-color: var(--primary);
            border-radius: 50%; display: none; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Texto */
        #artist { color: var(--primary); font-weight: 800; font-size: 0.85rem; text-transform: uppercase; display: block; }
        #title { font-size: 1.25rem; font-weight: 400; margin-top: 5px; display: block; line-height: 1.2; }

        /* Panel Derecho: Volumen Integrado */
        .vol-control {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 10px; padding-left: 15px;
            border-left: 1px solid #222;
        }
        .vol-slider {
            appearance: slider-vertical; width: 10px; height: 160px;
            accent-color: var(--primary); cursor: pointer;
        }

        .meta-footer { font-size: 0.7rem; color: var(--text-dim); margin-top: 20px; }
    </style>
</head>
<body>

<div class="player-card">
    <div class="main-controls">
        <div id="status" class="status-badge st-offline">Sin señal</div>
        
        <div id="vumetro" class="vumetro"></div>

        <div class="btn-container">
            <div id="spinner" class="spinner"></div>
            <button id="btn" class="play-btn">▶</button>
        </div>

        <div style="min-height: 80px;">
            <span id="artist">ENTRESIJO</span>
            <span id="title">Cargando...</span>
        </div>

        <div class="meta-footer">
            <span id="listeners">👥 0 oyentes</span>
        </div>
    </div>

    <div class="vol-control">
        <span style="font-size: 10px; font-weight: 900;">MAX</span>
        <input type="range" id="volume" class="vol-slider" min="0" max="1" step="0.05" value="0.8">
        <span style="font-size: 10px; font-weight: 900;">MIN</span>
    </div>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    const WORKER = "https://white-mud-e8b6.entresijoradio.workers.dev";
    const btn = document.getElementById("btn");
    const player = document.getElementById("player");
    const spinner = document.getElementById("spinner");
    const statusTag = document.getElementById("status");
    const vumetro = document.getElementById("vumetro");

    let isPlaying = false;
    let audioCtx, analyser, dataArray, source;

    // Crear barras del vúmetro
    for(let i=0; i<12; i++) {
        let b = document.createElement("div");
        b.className = "bar";
        vumetro.appendChild(b);
    }

    // Función para el movimiento real de las barras
    function updateVisuals() {
        if(!isPlaying) return;
        requestAnimationFrame(updateVisuals);
        analyser.getByteFrequencyData(dataArray);
        const bars = document.querySelectorAll('.bar');
        bars.forEach((bar, i) => {
            let val = dataArray[i * 2] || 0;
            bar.style.height = (val / 2.5) + 5 + "%";
        });
    }

    async function fetchMeta() {
        try {
            const res = await fetch(`${WORKER}/api/radio-info`);
            const d = await res.json();
            if (d.history && d.history.length > 0) {
    const historyHtml = d.history.map(item => `
        <div style="font-size: 0.75rem; padding: 10px 0; border-bottom: 1px solid #222;">
            <strong style="color: var(--primary); display: block;">${item.artist}</strong>
            <span>${item.title}</span>
            <small style="display: block; opacity: 0.5; font-size: 0.6rem;">${item.time}</small>
        </div>
    `).join('');
    document.getElementById("history-list").innerHTML = historyHtml;
}
            if(d.isLive) {
                if(!isPlaying) {
                    statusTag.className = "status-badge st-online";
                    statusTag.innerText = "● EN EL AIRE";
                }
                document.getElementById("artist").innerText = d.artist || "En vivo";
                document.getElementById("title").innerText = d.title || "Entresijo Radio";
                document.getElementById("listeners").innerText = `👥 ${d.listeners} oyentes`;
            } else {
                statusTag.className = "status-badge st-offline";
                statusTag.innerText = "Sin señal";
                document.getElementById("artist").innerText = "Offline";
                document.getElementById("title").innerText = "Enseguida volvemos";
            }
        } catch(e) {}
    }

    btn.onclick = async () => {
        if (!isPlaying) {
            // Inicializar AudioContext en el primer clic (requisito navegador)
            if(!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(player);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 64;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }

            btn.innerText = "";
            spinner.style.display = "block";
            statusTag.className = "status-badge st-connecting";
            statusTag.innerText = "Conectando...";

            player.src = `${WORKER}/api/stream?t=${Date.now()}`;
            try {
                await player.play();
                isPlaying = true;
                btn.innerText = "⏸";
                spinner.style.display = "none";
                statusTag.className = "status-badge st-online";
                statusTag.innerText = "● CONECTADO";
                updateVisuals();
            } catch(e) {
                resetBtn();
            }
        } else {
            isPlaying = false;
            player.pause();
            player.src = "";
            resetBtn();
            fetchMeta();
        }
    };

    function resetBtn() {
        btn.innerText = "▶";
        spinner.style.display = "none";
    }

    document.getElementById("volume").oninput = (e) => player.volume = e.target.value;

    setInterval(fetchMeta, 15000);
    fetchMeta();
</script>
</body>
</html>
