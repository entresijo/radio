<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entresijo Radio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff3b30; --bg: #000000; --text: #ffffff; --text-dim: #555; }

        /* RESET ANTI-NARANJA */
        * { -webkit-tap-highlight-color: transparent !important; outline: none !important; }
        *:focus { outline: none !important; box-shadow: none !important; }

        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; display: flex; 
            justify-content: center; align-items: center; min-height: 100vh;
            padding: 20px; overflow-x: hidden;
        }

        .player-app { width: 100%; max-width: 440px; text-align: center; }

        /* Header */
        .top-bar { margin-bottom: 50px; }
        #station-name { font-weight: 800; font-size: 14px; letter-spacing: 5px; color: var(--primary); display: block; margin-bottom: 10px; text-transform: uppercase; }
        #description { font-size: 12px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; display: block; }
        #clock { font-size: 13px; color: var(--text-dim); letter-spacing: 1px; }

        /* Badge de Estado */
        #status-badge { 
            font-size: 13px; font-weight: 800; padding: 10px 30px; 
            border-radius: 6px; display: inline-block; margin-bottom: 45px;
            text-transform: uppercase; letter-spacing: 3px;
            border: 1px solid #222; color: #333; transition: all 0.5s ease;
        }
        #status-badge.online { color: var(--primary); border-color: var(--primary); animation: glow-breath 2.5s infinite ease-in-out; }

        @keyframes glow-breath {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 59, 48, 0.1); opacity: 0.6; }
            50% { box-shadow: 0 0 30px rgba(255, 59, 48, 0.4); opacity: 1; }
        }

        /* Core UI */
        .core-ui { display: flex; align-items: center; justify-content: center; gap: 50px; margin-bottom: 60px; }
        .play-outer { position: relative; width: 140px; height: 140px; }

        .loading-ring {
            position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 4px solid transparent; border-top-color: var(--primary);
            border-radius: 50%; display: none; animation: spin 1s linear infinite; z-index: 1;
        }

        #vu-canvas { position: absolute; top: -10px; left: -10px; z-index: 2; transform: rotate(-90deg); pointer-events: none; }

        .play-btn {
            position: relative; z-index: 10; width: 100%; height: 100%; 
            border-radius: 50%; background: #0e0e0e; border: 1px solid #222;
            color: white; font-size: 45px; cursor: pointer; transition: transform 0.2s ease;
            display: flex; align-items: center; justify-content: center;
        }
        .play-btn:active { transform: scale(0.92); }

        /* VOLUMEN ROJO (Vertical con Transform para evitar el azul de sistema) */
        .vol-fader { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 40px; }
        .vol-slider {
            -webkit-appearance: none; width: 150px; height: 8px;
            background: #1a1a1a; border-radius: 10px;
            transform: rotate(-90deg); margin: 70px 0; cursor: pointer;
        }
        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 24px; height: 12px;
            background: var(--primary); border-radius: 3px; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .vol-label { font-size: 12px; color: var(--text-dim); font-weight: 800; letter-spacing: 2px; }

        /* Metadata */
        .meta-display { margin-bottom: 60px; }
        #artist { display: block; font-size: 15px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; }
        #title { display: block; font-size: 32px; font-weight: 200; line-height: 1.1; }

        /* Historial Recuperado */
        .history-wrap { text-align: left; border-top: 1px solid #111; padding-top: 25px; }
        .history-toggle { background: none; border: none; color: var(--text-dim); font-size: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        #history-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; margin-top: 20px; }
        .h-item { font-size: 14px; margin-bottom: 18px; border-left: 3px solid #1a1a1a; padding-left: 15px; opacity: 0.8; }
        .h-item strong { color: var(--primary); font-weight: 600; display: block; font-size: 11px; margin-bottom: 4px; }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="player-app">
    <div class="top-bar">
        <span id="station-name">ENTRESIJO RADIO</span>
        <span id="description">CARGANDO...</span>
        <div id="clock">--:-- — --/--/--</div>
    </div>

    <div id="status-badge">Detectando señal...</div>

    <div class="core-ui">
        <div class="play-outer">
            <div id="loading-ring" class="loading-ring"></div>
            <canvas id="vu-canvas" width="160" height="160"></canvas>
            <button id="btn" class="play-btn" disabled>▶</button>
        </div>

        <div class="vol-fader">
            <span class="vol-label">VOL</span>
            <input type="range" id="volume" class="vol-slider" min="0" max="1" step="0.05" value="0.8">
            <span class="vol-label">🔊</span>
        </div>
    </div>

    <div class="meta-display">
        <span id="artist">ESCUCHANDO AHORA</span>
        <span id="title">Conectando...</span>
    </div>

    <div class="history-wrap">
        <button class="history-toggle" onclick="toggleHistory()">Historial +</button>
        <div id="history-content"><div id="history-list"></div></div>
    </div>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    const WORKER = "https://white-mud-e8b6.entresijoradio.workers.dev";
    const btn = document.getElementById("btn");
    const player = document.getElementById("player");
    const ring = document.getElementById("loading-ring");
    const statusBadge = document.getElementById("status-badge");
    const canvas = document.getElementById("vu-canvas");
    const ctx = canvas.getContext("2d");

    let isPlaying = false;
    let isUserPaused = true;
    let audioCtx, analyser, dataArray;

    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + " — " + now.toLocaleDateString([], {day: '2-digit', month:'2-digit', year:'2-digit'});
    }
    setInterval(updateClock, 1000); updateClock();

    function drawVu() {
        if(!isPlaying) { ctx.clearRect(0,0,160,160); return; }
        requestAnimationFrame(drawVu);
        analyser.getByteFrequencyData(dataArray);
        ctx.clearRect(0,0,160,160);
        ctx.lineWidth = 4; ctx.strokeStyle = "#ff3b30";
        const avg = dataArray.reduce((a,b) => a+b) / dataArray.length;
        const limit = (avg / 255) * Math.PI * 2;
        ctx.beginPath(); ctx.arc(80, 80, 76, 0, limit); ctx.stroke();
    }

    async function fetchMeta() {
        try {
            const res = await fetch(`${WORKER}/api/radio-info`);
            const d = await res.json();
            document.getElementById("station-name").innerText = d.radioName || "ENTRESIJO RADIO";
            document.getElementById("description").innerText = d.description || "";
            if(d.isLive) {
                statusBadge.innerText = "● EN EL AIRE";
                statusBadge.classList.add("online");
                btn.disabled = false;
                document.getElementById("artist").innerText = (d.artist === "En vivo") ? "ESCUCHANDO AHORA" : d.artist;
                document.getElementById("title").innerText = d.title;
                if(d.history) {
                    document.getElementById("history-list").innerHTML = d.history.map(h => `
                        <div class="h-item"><strong>${h.artist}</strong>${h.title}</div>
                    `).join('');
                }
            } else {
                statusBadge.innerText = "OFFLINE";
                statusBadge.classList.remove("online");
                btn.disabled = true;
            }
        } catch(e) {}
    }

    async function startStream() {
        player.src = `${WORKER}/api/stream?t=${Date.now()}`;
        try {
            await player.play();
            isPlaying = true;
            isUserPaused = false;
            btn.innerText = "⏸";
            ring.style.display = "none";
            statusBadge.innerText = "● EN EL AIRE";
            drawVu();
        } catch(e) {
            isPlaying = false;
            btn.innerText = "▶";
            ring.style.display = "none";
        }
    }

    btn.onclick = async () => {
        if (!isPlaying) {
            btn.innerText = "";
            ring.style.display = "block";
            statusBadge.innerText = "CONECTANDO...";
            
            if(!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaElementSource(player);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 64;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            await startStream();
        } else {
            isUserPaused = true;
            isPlaying = false;
            player.pause();
            player.src = "";
            btn.innerText = "▶";
            ctx.clearRect(0,0,160,160);
        }
    };

    // RECONEXIÓN AUTOMÁTICA AL CORTE (SOLO SI NO ES PAUSA)
    player.onstalled = player.onerror = () => {
        if (!isUserPaused && isPlaying) {
            console.log("Señal caída. Reconectando...");
            startStream();
        }
    };

    function toggleHistory() {
        const content = document.getElementById("history-content");
        content.style.maxHeight = content.style.maxHeight === "500px" ? "0" : "500px";
    }

    document.getElementById("volume").oninput = (e) => { player.volume = e.target.value; };
    setInterval(fetchMeta, 15000); fetchMeta();
</script>
</body>
</html>
